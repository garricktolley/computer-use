<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #0d1117;
      --bg-surface: #161b22;
      --bg-card: #1c2128;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-focus: #58a6ff;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --text-faint: #484f58;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --purple: #bc8cff;
      --radius: 8px;
      --mono: 'SF Mono', Monaco, Consolas, 'Liberation Mono', monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-base);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); }
    .status-dot.running { background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
    .status-dot.error { background: var(--red); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Input bar */
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
      align-items: center;
    }

    .input-bar input[type="text"] {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-bar input[type="text"]:focus { border-color: var(--border-focus); }
    .input-bar input[type="text"]::placeholder { color: var(--text-faint); }

    .capture-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0 4px;
      user-select: none;
    }

    .capture-toggle input[type="checkbox"] {
      appearance: none;
      width: 36px;
      height: 20px;
      background: var(--border);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .capture-toggle input[type="checkbox"]::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .capture-toggle input[type="checkbox"]:checked { background: var(--purple); }
    .capture-toggle input[type="checkbox"]:checked::after { transform: translateX(16px); background: #fff; }

    .toggle-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    .mode-toggle {
      display: flex;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .mode-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .mode-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .mode-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .mode-btn.active { background: var(--accent); color: #fff; }
    .mode-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Credentials */
    .creds-disclosure {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .creds-toggle-btn {
      font-size: 11px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .creds-toggle-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .creds-toggle-btn.open { color: var(--yellow); border-color: var(--yellow); }

    .creds-fields {
      display: none;
      position: absolute;
      top: 100%;
      margin-top: 4px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      z-index: 10;
      gap: 6px;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      min-width: 240px;
    }

    .creds-fields.open { display: flex; }

    .creds-fields input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    .creds-fields input:focus { border-color: var(--border-focus); }
    .creds-fields input::placeholder { color: var(--text-faint); }

    .creds-fields label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: rgba(248, 81, 73, 0.1); }
    .btn-danger:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* Main content */
    .content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* Browser panel */
    .browser-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    .step-counter { margin-left: auto; font-variant-numeric: tabular-nums; }

    .browser-viewport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    .browser-viewport img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

    .browser-placeholder {
      color: var(--text-faint);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }

    /* Right sidebar */
    .sidebar {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
    }

    /* Log panel */
    .log-section { display: flex; flex-direction: column; flex: 1; min-height: 0; }

    .log-header {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .clear-btn {
      font-size: 11px;
      color: var(--text-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .clear-btn:hover { color: var(--text-muted); background: rgba(255,255,255,0.05); }

    .log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      min-height: 80px;
    }

    .log-entries::-webkit-scrollbar { width: 6px; }
    .log-entries::-webkit-scrollbar-track { background: transparent; }
    .log-entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-entry {
      padding: 6px 16px;
      font-size: 12px;
      line-height: 1.5;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: fadeIn 0.15s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .log-entry .tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .log-entry.thought .tag { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
    .log-entry.action .tag { background: rgba(188, 140, 255, 0.15); color: var(--purple); }
    .log-entry.action_error .tag { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .log-entry.status .tag { background: rgba(125, 133, 144, 0.15); color: var(--text-muted); }
    .log-entry.done .tag { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .log-entry.error .tag { background: rgba(248, 81, 73, 0.15); color: var(--red); }

    .log-entry .msg { color: var(--text-muted); word-break: break-word; }
    .log-entry.thought .msg { color: var(--text); }
    .log-entry.done .msg { color: var(--green); }
    .log-entry.error .msg { color: var(--red); }

    /* API Panel */
    .api-panel {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: 55%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .api-header {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--purple);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: rgba(188, 140, 255, 0.05);
    }

    .api-header:hover { background: rgba(188, 140, 255, 0.08); }
    .api-collapse-icon { font-size: 10px; }

    .api-body {
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .api-body::-webkit-scrollbar { width: 6px; }
    .api-body::-webkit-scrollbar-track { background: transparent; }
    .api-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .api-summary { font-size: 13px; color: var(--text); line-height: 1.4; }

    .api-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .api-param { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .api-param label { font-size: 11px; color: var(--text-muted); }
    .api-param-desc { font-size: 10px; color: var(--text-faint); font-style: italic; }

    .api-param input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      color: var(--text);
      font-size: 12px;
      font-family: var(--mono);
      outline: none;
    }

    .api-param input:focus { border-color: var(--border-focus); }

    .api-code-block {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 180px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .api-response-status { font-size: 12px; margin-bottom: 6px; font-weight: 600; }
    .api-response-status.ok { color: var(--green); }
    .api-response-status.err { color: var(--red); }

    .api-file-tag {
      font-size: 10px;
      color: var(--text-faint);
      font-family: var(--mono);
      padding: 2px 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
      display: inline-block;
      margin-top: 4px;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .content { flex-direction: column; }
      .sidebar { width: 100%; height: 240px; border-top: 1px solid var(--border); }
      .browser-panel { border-right: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">A</div>
      <span>Browser Agent</span>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Idle</span>
    </div>
  </header>

  <div class="input-bar">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="visual" onclick="setMode('visual')">Visual</button>
      <button class="mode-btn" data-mode="smart" onclick="setMode('smart')">Smart</button>
    </div>
    <input
      type="text"
      id="urlInput"
      placeholder="https://example.com (optional)"
      autocomplete="off"
      style="max-width:220px;flex:none"
    />
    <input
      type="text"
      id="taskInput"
      placeholder="Describe what you want the agent to do..."
      autocomplete="off"
    />
    <label class="capture-toggle" title="Enable network capture to generate a reusable API">
      <input type="checkbox" id="captureToggle" />
      <span class="toggle-label">Capture API</span>
    </label>
    <div class="creds-disclosure" style="position:relative">
      <button class="creds-toggle-btn" id="credsToggleBtn" onclick="toggleCreds()">Credentials</button>
      <div class="creds-fields" id="credsFields">
        <label>Username</label>
        <input type="text" id="credsUsername" placeholder="username" autocomplete="off" />
        <label>Password</label>
        <input type="password" id="credsPassword" placeholder="password" autocomplete="off" />
        <label>Notes (optional)</label>
        <input type="text" id="credsNotes" placeholder="e.g. use OAuth, 2FA code..." autocomplete="off" />
      </div>
    </div>
    <button class="btn btn-primary" id="runBtn" onclick="startAgent()">Run</button>
    <button class="btn btn-danger" id="stopBtn" onclick="stopAgent()" disabled>Stop</button>
  </div>

  <div class="content">
    <div class="browser-panel">
      <div class="panel-header">
        <span>Browser</span>
        <span class="step-counter" id="stepCounter"></span>
      </div>
      <div class="browser-viewport" id="viewport">
        <div class="browser-placeholder" id="placeholder">
          Enter a task above and click Run<br>to watch the agent work
        </div>
        <img id="browserImg" style="display:none" alt="Browser screenshot" />
      </div>
    </div>

    <div class="sidebar">
      <div class="log-section">
        <div class="log-header">
          <span>Activity</span>
          <button class="clear-btn" onclick="clearLog()">Clear</button>
        </div>
        <div class="log-entries" id="logEntries"></div>
      </div>

      <div class="api-panel" id="apiPanel" style="display:none">
        <div class="api-header" onclick="toggleApiPanel()">
          <span>Generated API</span>
          <span class="api-collapse-icon" id="apiCollapseIcon">&#9660;</span>
        </div>
        <div class="api-body" id="apiBody">
          <div class="api-summary" id="apiSummary"></div>

          <div id="apiAuthSection" style="display:none">
            <div class="api-section-title">Authentication</div>
            <div id="apiAuthInfo" style="font-size:12px;color:var(--text-muted);margin-bottom:8px;line-height:1.5"></div>
          </div>

          <div>
            <div class="api-section-title">Parameters</div>
            <div id="apiParams"></div>
          </div>

          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-primary btn-sm" onclick="executeApi()" id="apiRunBtn">Run Request</button>
            <span class="api-file-tag" id="apiFilename"></span>
          </div>

          <div id="apiResponseSection" style="display:none">
            <div class="api-section-title">Response</div>
            <div class="api-response-status" id="apiResponseStatus"></div>
            <pre class="api-code-block" id="apiResponseBody"></pre>
          </div>

          <div>
            <div class="api-section-title">Generated Code</div>
            <pre class="api-code-block" id="apiCode"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let running = false;
    let currentApiConfig = null;
    let currentMode = 'visual';

    function setMode(mode) {
      if (running) return;
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
    }

    function toggleCreds() {
      const fields = document.getElementById('credsFields');
      const btn = document.getElementById('credsToggleBtn');
      fields.classList.toggle('open');
      btn.classList.toggle('open');
    }

    function getCredentials() {
      const username = document.getElementById('credsUsername').value.trim();
      const password = document.getElementById('credsPassword').value;
      const notes = document.getElementById('credsNotes').value.trim();
      if (!username && !password) return null;
      return { username, password, notes: notes || undefined };
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);
      ws.onopen = () => console.log('Connected');
      ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
      ws.onclose = () => { console.log('Disconnected, reconnecting...'); setTimeout(connect, 2000); };
      ws.onerror = () => ws.close();
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'screenshot':
          showScreenshot(msg.data);
          break;
        case 'thought':
          addLog('thought', 'Think', msg.text);
          break;
        case 'action':
          addLog('action', 'Action', msg.text);
          break;
        case 'action_error':
          addLog('action_error', 'Error', msg.text);
          break;
        case 'status':
          addLog('status', 'Status', msg.text);
          break;
        case 'step':
          document.getElementById('stepCounter').textContent = `Step ${msg.step} / ${msg.maxSteps}`;
          break;
        case 'network_summary':
          addLog('status', 'Net', `Captured ${msg.count} API request(s)`);
          break;
        case 'generated_api':
          currentApiConfig = { requestConfig: msg.requestConfig, parameters: msg.parameters, auth: msg.auth };
          showApiPanel(msg);
          break;
        case 'done':
          addLog('done', 'Done', msg.message);
          setRunning(false);
          break;
        case 'error':
          addLog('error', 'Error', msg.message);
          setRunning(false);
          break;
      }
    }

    function showScreenshot(base64) {
      const img = document.getElementById('browserImg');
      const placeholder = document.getElementById('placeholder');
      img.src = `data:image/jpeg;base64,${base64}`;
      img.style.display = 'block';
      placeholder.style.display = 'none';
    }

    function addLog(type, tag, text) {
      const entries = document.getElementById('logEntries');
      const el = document.createElement('div');
      el.className = `log-entry ${type}`;
      el.innerHTML = `<span class="tag">${tag}</span><span class="msg">${escapeHtml(text)}</span>`;
      entries.appendChild(el);
      entries.scrollTop = entries.scrollHeight;
    }

    function clearLog() {
      document.getElementById('logEntries').innerHTML = '';
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function setRunning(state) {
      running = state;
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      const runBtn = document.getElementById('runBtn');
      const stopBtn = document.getElementById('stopBtn');
      const input = document.getElementById('taskInput');

      const urlInput = document.getElementById('urlInput');
      const modeBtns = document.querySelectorAll('.mode-btn');
      if (state) {
        dot.className = 'status-dot running';
        text.textContent = `Running (${currentMode === 'smart' ? 'Smart' : 'Visual'})`;
        runBtn.disabled = true;
        stopBtn.disabled = false;
        input.disabled = true;
        urlInput.disabled = true;
        modeBtns.forEach(b => b.disabled = true);
      } else {
        dot.className = 'status-dot';
        text.textContent = 'Idle';
        runBtn.disabled = false;
        stopBtn.disabled = true;
        input.disabled = false;
        urlInput.disabled = false;
        modeBtns.forEach(b => b.disabled = false);
      }
    }

    function startAgent() {
      const task = document.getElementById('taskInput').value.trim();
      const startUrl = document.getElementById('urlInput').value.trim() || null;
      const captureNetwork = document.getElementById('captureToggle').checked;
      const credentials = getCredentials();
      if (!task || !ws || ws.readyState !== 1) return;

      // Close creds dropdown
      document.getElementById('credsFields').classList.remove('open');
      document.getElementById('credsToggleBtn').classList.remove('open');

      setRunning(true);
      document.getElementById('stepCounter').textContent = '';
      document.getElementById('apiPanel').style.display = 'none';
      document.getElementById('apiResponseSection').style.display = 'none';
      currentApiConfig = null;
      const msg = { type: 'start', task, startUrl, captureNetwork, mode: currentMode };
      if (credentials) msg.credentials = credentials;
      ws.send(JSON.stringify(msg));
    }

    function stopAgent() {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'stop' }));
      }
    }

    // ── API Panel ──

    function showApiPanel(msg) {
      const panel = document.getElementById('apiPanel');
      panel.style.display = 'flex';

      document.getElementById('apiSummary').textContent = msg.summary;
      document.getElementById('apiCode').textContent = msg.code;
      document.getElementById('apiFilename').textContent = msg.filename;

      // Auth section
      const authSection = document.getElementById('apiAuthSection');
      const authInfo = document.getElementById('apiAuthInfo');
      if (msg.auth && msg.auth.type !== 'none') {
        authSection.style.display = 'block';
        const badge = `<span style="display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;background:rgba(210,153,34,0.15);color:var(--yellow)">${escapeHtml(msg.auth.type)}</span>`;
        authInfo.innerHTML = `${badge} ${escapeHtml(msg.auth.description || '')}`;
        if (msg.auth.tokenExtraction) {
          authInfo.innerHTML += `<br><span style="color:var(--text-faint);font-size:11px">Token from: ${escapeHtml(msg.auth.tokenExtraction)}</span>`;
        }
      } else {
        authSection.style.display = 'none';
      }

      // Parameters
      const paramsDiv = document.getElementById('apiParams');
      paramsDiv.innerHTML = '';
      (msg.parameters || []).forEach((p, i) => {
        const isPassword = p.name.toLowerCase().includes('password');
        const div = document.createElement('div');
        div.className = 'api-param';
        div.innerHTML = `
          <label>${escapeHtml(p.name)} <span style="color:var(--text-faint)">(${escapeHtml(p.in)})</span></label>
          ${p.description ? `<span class="api-param-desc">${escapeHtml(p.description)}</span>` : ''}
          <input type="${isPassword ? 'password' : 'text'}" data-param-index="${i}" value="${escapeHtml(p.default || '')}" />
        `;
        paramsDiv.appendChild(div);
      });

      document.getElementById('apiResponseSection').style.display = 'none';
    }

    function toggleApiPanel() {
      const body = document.getElementById('apiBody');
      const icon = document.getElementById('apiCollapseIcon');
      if (body.style.display === 'none') {
        body.style.display = 'flex';
        icon.innerHTML = '&#9660;';
      } else {
        body.style.display = 'none';
        icon.innerHTML = '&#9654;';
      }
    }

    async function executeApi() {
      if (!currentApiConfig) return;

      const btn = document.getElementById('apiRunBtn');
      btn.disabled = true;
      btn.textContent = 'Running...';

      const paramInputs = document.querySelectorAll('#apiParams input[data-param-index]');
      const paramValues = {};
      paramInputs.forEach(input => {
        const idx = parseInt(input.dataset.paramIndex);
        const param = currentApiConfig.parameters[idx];
        paramValues[param.name] = input.value;
      });

      let { url, method, headers, body } = { ...currentApiConfig.requestConfig };
      headers = { ...headers };

      for (const [name, value] of Object.entries(paramValues)) {
        const ph = `{{${name}}}`;
        url = url.replaceAll(ph, value);
        if (typeof body === 'string') body = body.replaceAll(ph, value);
        for (const [k, v] of Object.entries(headers)) {
          if (typeof v === 'string') headers[k] = v.replaceAll(ph, value);
        }
      }

      try {
        const res = await fetch('/api/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, method, headers, body }),
        });
        const data = await res.json();

        const statusEl = document.getElementById('apiResponseStatus');
        statusEl.textContent = `${data.status} ${data.statusText}`;
        statusEl.className = 'api-response-status ' + (data.status < 400 ? 'ok' : 'err');

        const bodyEl = document.getElementById('apiResponseBody');
        bodyEl.textContent = typeof data.body === 'string' ? data.body : JSON.stringify(data.body, null, 2);

        document.getElementById('apiResponseSection').style.display = 'block';
      } catch (err) {
        const statusEl = document.getElementById('apiResponseStatus');
        statusEl.textContent = `Error: ${err.message}`;
        statusEl.className = 'api-response-status err';
        document.getElementById('apiResponseBody').textContent = '';
        document.getElementById('apiResponseSection').style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Request';
      }
    }

    // Enter to submit
    document.getElementById('taskInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !running) startAgent();
    });

    connect();
  </script>
</body>
</html>
